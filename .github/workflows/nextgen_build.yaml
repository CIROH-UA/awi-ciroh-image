name: Build and Push Comm Nextgen

on:
  push:
    branches:
      - ewri2026
    tags:
      - 'v*'
  pull_request:
    branches:
      - ewri2026
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (example: v1.1.1)'
        required: true
        default: 'manual'

env:
  IMAGE_NAME: ewri2026
  QUAY_ORG: awiciroh

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_CIROH_USERNAME }}
          password: ${{ secrets.QUAY_CIROH_PASSWORD }}

      - name: Determine tag
        id: tag
        run: |
          # Manual workflow input
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Git tag push (refs/tags/v1.1.1 → v1.1.1)
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Branch push (refs/heads/ewri2026 → ewri2026)
          if [[ "${GITHUB_REF}" == refs/heads/* ]]; then
            echo "value=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Pull request → use source branch name
          echo "value=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"

      - name: Debug tag
        run: |
          echo "Image tag: ${{ steps.tag.outputs.value }}"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          docker system prune -af

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: quay.io/${{ env.QUAY_ORG }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}

      - name: Run smoke tests
        id: smoke-tests
        if: github.event_name == 'pull_request'
        timeout-minutes: 30
        run: |
          IMAGE="quay.io/${{ env.QUAY_ORG }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}"
          docker run --rm "$IMAGE" /tests/test-entrypoint.sh 2>&1 | tee /tmp/test-results.log
          echo "result=pass" >> "$GITHUB_OUTPUT"

      - name: Comment test results on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try {
              log = fs.readFileSync('/tmp/test-results.log', 'utf8');
            } catch (e) {
              log = 'No test output captured.';
            }
            const passed = '${{ steps.smoke-tests.outcome }}' === 'success';
            const status = passed ? 'PASSED: Smoke tests' : 'FAILED: Smoke tests';
            const body = `## ${status}\n\n<details><summary>Test output</summary>\n\n\`\`\`\n${log.slice(-3000)}\n\`\`\`\n\n</details>`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
