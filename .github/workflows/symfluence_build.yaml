name: Build and push symfluence
on:
  push:
    branches:
      - symfluence-install
  pull_request:
    branches:
      - symfluence-install
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (example: v1.1.1)'
        required: true
        default: 'manual'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: cleanup disk space
      run: |
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
        df -h

    - name: Checkout files in repo
      uses: actions/checkout@main

    - name: Set image tag name
      shell: bash
      run: |
        ref_name="${{ github.event.inputs.tag }}"

        if [ -z "$ref_name" ] || [ "$ref_name" = "manual" ]; then
          ref_name=$(grep -oE 'git\+https://github\.com/DarriEy/SYMFLUENCE\.git@[^[:space:]\\]+' Dockerfile | head -n1 | sed 's#.*@##')
        fi

        if [ -z "$ref_name" ]; then
          echo "Could not determine SYMFLUENCE ref for image tag" >&2
          exit 1
        fi

        safe_ref=$(echo "$ref_name" | sed 's#[/:@ ]#-#g' | tr -cd '[:alnum:]._-')
        echo "TAG_NAME=symfluence-$safe_ref" >> "$GITHUB_ENV"
        echo "Using additional image tag: symfluence-$safe_ref"

    - name: Build and push the image to quay.io
      uses: jupyterhub/repo2docker-action@master
      with:
        # Make sure username & password/token pair matches your registry credentials
        DOCKER_USERNAME: ${{ secrets.QUAY_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
        DOCKER_REGISTRY: "quay.io"
        IMAGE_NAME: "2i2c/awi-ciroh-image"
        ADDITIONAL_TAG: ${{ env.TAG_NAME }}

    # Lets us monitor disks getting full as images get bigger over time
    - name: Show how much disk space is left
      run: df -h
